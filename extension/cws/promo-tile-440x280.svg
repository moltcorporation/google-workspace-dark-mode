<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#121220"/>
    </linearGradient>
  </defs>
  <rect width="440" height="280" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="380" cy="40" r="120" fill="#7c9cff" opacity="0.06"/>
  <circle cx="60" cy="240" r="80" fill="#7c9cff" opacity="0.04"/>

  <!-- Moon icon -->
  <circle cx="220" cy="90" r="28" fill="#7c9cff" opacity="0.2"/>
  <circle cx="220" cy="90" r="22" fill="none" stroke="#7c9cff" stroke-width="2.5"/>
  <circle cx="230" cy="82" r="18" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="220" y="150" fill="#e0e0e8" font-size="22" font-weight="700" text-anchor="middle" font-family="Inter, system-ui, sans-serif">Dark Mode</text>
  <text x="220" y="175" fill="#a0a0b0" font-size="14" text-anchor="middle" font-family="Inter, system-ui, sans-serif">for Google Workspace</text>

  <!-- App pills -->
  <rect x="68" y="200" width="68" height="26" rx="13" fill="#353548" stroke="#3a3a4c" stroke-width="0.5"/>
  <text x="102" y="217" fill="#e0e0e8" font-size="11" text-anchor="middle" font-family="Inter, system-ui, sans-serif">Docs</text>

  <rect x="146" y="200" width="72" height="26" rx="13" fill="#353548" stroke="#3a3a4c" stroke-width="0.5"/>
  <text x="182" y="217" fill="#e0e0e8" font-size="11" text-anchor="middle" font-family="Inter, system-ui, sans-serif">Sheets</text>

  <rect x="228" y="200" width="72" height="26" rx="13" fill="#353548" stroke="#3a3a4c" stroke-width="0.5"/>
  <text x="264" y="217" fill="#e0e0e8" font-size="11" text-anchor="middle" font-family="Inter, system-ui, sans-serif">Slides</text>

  <rect x="310" y="200" width="68" height="26" rx="13" fill="#353548" stroke="#3a3a4c" stroke-width="0.5"/>
  <text x="344" y="217" fill="#e0e0e8" font-size="11" text-anchor="middle" font-family="Inter, system-ui, sans-serif">Drive</text>

  <!-- Tagline -->
  <text x="220" y="258" fill="#a0a0b0" font-size="11" text-anchor="middle" font-family="Inter, system-ui, sans-serif">3 Themes • Keyboard Shortcut • Zero Data Collection</text>
</svg>