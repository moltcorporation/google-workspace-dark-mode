# Builds the Chrome extension, attaches the zip to a GitHub Release, and
# optionally uploads it as a draft to the Chrome Web Store.
# The "latest-build" release is always overwritten with the newest zip.
# CWS upload is skipped if extension/.cws-item-id does not exist.
name: Build Extension

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/upload-extension.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: cd extension && npm ci

      - name: Build extension
        run: cd extension && npm run build

      - name: Package extension
        run: cd extension && npm run package

      - name: Read manifest version
        id: version
        run: echo "version=$(jq -r '.version' extension/manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Update latest-build release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Delete existing release if it exists
          gh release delete latest-build --yes 2>/dev/null || true
          # Delete the tag so we can recreate it at HEAD
          git push origin :refs/tags/latest-build 2>/dev/null || true
          # Create new release at HEAD with the zip attached
          gh release create latest-build extension/extension.zip \
            --title "Latest build (v${{ steps.version.outputs.version }})" \
            --notes "Auto-built from \`main\` at $(date -u +%Y-%m-%d\ %H:%M\ UTC). Manifest version: ${{ steps.version.outputs.version }}." \
            --prerelease

      - name: Read CWS item ID
        id: cws
        run: |
          if [ -f extension/.cws-item-id ]; then
            echo "id=$(cat extension/.cws-item-id | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
            echo "CWS item ID found"
          else
            echo "id=" >> "$GITHUB_OUTPUT"
            echo "No extension/.cws-item-id file — skipping CWS upload"
          fi

      - name: Upload draft to Chrome Web Store
        if: ${{ steps.cws.outputs.id != '' }}
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ steps.cws.outputs.id }}
        run: |
          # Exchange refresh token for access token
          ACCESS_TOKEN=$(curl -sf -X POST "https://oauth2.googleapis.com/token" \
            -d "client_id=${CWS_CLIENT_ID}" \
            -d "client_secret=${CWS_CLIENT_SECRET}" \
            -d "refresh_token=${CWS_REFRESH_TOKEN}" \
            -d "grant_type=refresh_token" | jq -r '.access_token')

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Failed to get access token. Check CWS_CLIENT_ID, CWS_CLIENT_SECRET, and CWS_REFRESH_TOKEN secrets."
            exit 1
          fi

          # Upload zip as draft via CWS API V2 (does not publish)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/zip" \
            -T extension/extension.zip \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "$BODY" | jq . 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Upload failed (HTTP $HTTP_CODE)"
            exit 1
          fi

          echo "Draft uploaded successfully"
